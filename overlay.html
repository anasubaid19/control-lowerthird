<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Lower Third Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
  }

  #lt-wrapper {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #lt-image {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: auto;
  }

  #lt-text {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  #lt-nama, #lt-jabatan {
    white-space: nowrap;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    line-height: 1.2;
    display: block;
  }

  /* Animasi muncul */
  @keyframes textIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Animasi hilang */
  @keyframes textOut {
    from { opacity:1; transform:translateY(0); }
    to   { opacity:0; transform:translateY(-6px); }
  }

  #lt-text.animating-in  { animation: textIn  0.4s ease forwards; }
  #lt-text.animating-out { animation: textOut 0.3s ease forwards; }
  #lt-text.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="lt-wrapper">
  <img id="lt-image" src="/lowerthird.png">
  <div id="lt-text" class="hidden">
    <div id="lt-nama"></div>
    <div id="lt-jabatan"></div>
  </div>
</div>

<script>
  const ltText    = document.getElementById('lt-text');
  const ltNama    = document.getElementById('lt-nama');
  const ltJabatan = document.getElementById('lt-jabatan');

  let lastKey = null;

  async function poll() {
    try {
      const res = await fetch('/api/get');
      if (!res.ok) return;
      const { state } = await res.json();
      if (!state) return;
      const key = JSON.stringify(state);
      if (key === lastKey) return;
      lastKey = key;
      applyState(state);
    } catch(e) {}
  }

  function applyState(s) {
    ltText.style.left        = (s.posX ?? 285) + 'px';
    ltText.style.bottom      = (s.posY ?? 308) + 'px';
    ltText.style.gap         = (s.gap  ?? 4)   + 'px';

    const font = s.fontFamily || 'Outfit';
    ltNama.style.fontSize    = (s.namaSize    ?? 38)  + 'px';
    ltNama.style.fontWeight  =  s.namaWeight  || '700';
    ltNama.style.color       =  s.namaColor   || '#ffffff';
    ltNama.style.fontFamily  = `'${font}', sans-serif`;

    ltJabatan.style.fontSize    = (s.jabatanSize   ?? 26)  + 'px';
    ltJabatan.style.fontWeight  =  s.jabatanWeight || '300';
    ltJabatan.style.color       =  s.jabatanColor  || '#e0f0ff';
    ltJabatan.style.fontFamily  = `'${font}', sans-serif`;

    const textChanged = ltNama.textContent !== (s.nama||'') || ltJabatan.textContent !== (s.jabatan||'');

    if (!s.visible) {
      if (!ltText.classList.contains('hidden')) {
        ltText.classList.remove('animating-in');
        ltText.classList.add('animating-out');
        setTimeout(() => { ltText.classList.add('hidden'); ltText.classList.remove('animating-out'); }, 320);
      }
      return;
    }

    if (ltText.classList.contains('hidden') || textChanged) {
      if (textChanged && !ltText.classList.contains('hidden')) {
        ltText.classList.remove('animating-in');
        ltText.classList.add('animating-out');
        setTimeout(() => {
          ltNama.textContent    = s.nama    || '';
          ltJabatan.textContent = s.jabatan || '';
          ltText.classList.remove('animating-out','hidden');
          ltText.classList.add('animating-in');
        }, 320);
      } else {
        ltNama.textContent    = s.nama    || '';
        ltJabatan.textContent = s.jabatan || '';
        ltText.classList.remove('hidden','animating-out');
        ltText.classList.add('animating-in');
      }
    }
  }

  setInterval(poll, 800);
  poll();
</script>
</body>
</html>
