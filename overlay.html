<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Lower Third Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
  }

  #lt-wrapper {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #lt-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #lt-text {
    position: absolute;
    display: flex;
    flex-direction: column;
    /* Default: tersembunyi, opacity dikendalikan sepenuhnya oleh JS */
    opacity: 0;
    pointer-events: none;
  }

  #lt-nama, #lt-jabatan {
    white-space: nowrap;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    line-height: 1.2;
    display: block;
  }

  /* ── FADE ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-6px); }
  }

  /* ── SLIDE UP ── */
  @keyframes slideUpIn {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUpOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-30px); }
  }

  /* ── SLIDE LEFT ── */
  @keyframes slideLeftIn {
    from { opacity: 0; transform: translateX(-60px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideLeftOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(60px); }
  }

  /* ── ZOOM ── */
  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes zoomOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(1.1); }
  }
</style>
</head>
<body>

<div id="lt-wrapper">
  <img id="lt-image" src="/lowerthird.png" alt="">
  <div id="lt-text">
    <div id="lt-nama"></div>
    <div id="lt-jabatan"></div>
  </div>
</div>

<script>
  const ltText    = document.getElementById('lt-text');
  const ltNama    = document.getElementById('lt-nama');
  const ltJabatan = document.getElementById('lt-jabatan');
  const ltImage   = document.getElementById('lt-image');

  // ── STATE ──
  let lastKey   = null;
  let isShowing = false;
  let autoTimer = null;

  // ID untuk membatalkan callback animateOut yang pending
  // Jika animateIn dipanggil sebelum callback animateOut selesai,
  // callback lama akan dibatalkan dan tidak akan mengubah opacity
  let callbackId = 0;

  // ── ANIMATION MAPS ──
  const ANIMS = {
    'fade':       { in: 'fadeIn',      out: 'fadeOut',      durIn: 400, durOut: 320 },
    'slide-up':   { in: 'slideUpIn',   out: 'slideUpOut',   durIn: 450, durOut: 300 },
    'slide-left': { in: 'slideLeftIn', out: 'slideLeftOut', durIn: 450, durOut: 300 },
    'zoom':       { in: 'zoomIn',      out: 'zoomOut',      durIn: 400, durOut: 300 },
  };

  function getAnim(type) {
    return ANIMS[type] || ANIMS['fade'];
  }

  // ── FIX: force reflow sebelum set animasi baru ──
  // Tanpa ini, browser tidak mendeteksi perubahan animasi dan tidak me-restart-nya
  function resetAnimation(animationValue) {
    ltText.style.animation = 'none';
    void ltText.offsetWidth; // force reflow — ini yang memaksa browser restart animasi
    ltText.style.animation = animationValue;
  }

  // ── ANIMATE IN ──
  function animateIn(type) {
    callbackId++;
    ltText.style.opacity = ''; // clear inline opacity
    const a = getAnim(type);
    resetAnimation(`${a.in} ${a.durIn}ms ease forwards`);
    isShowing = true;
  }

  // ── ANIMATE OUT ──
  function animateOut(type, cb) {
    const a  = getAnim(type);
    const id = ++callbackId;
    resetAnimation(`${a.out} ${a.durOut}ms ease forwards`);
    setTimeout(() => {
      if (id !== callbackId) return;
      isShowing = false;
      ltText.style.opacity = '0';
      if (typeof cb === 'function') cb();
    }, a.durOut + 20);
  }

  // ── APPLY STYLE ──
  function applyStyle(s) {
    ltText.style.left   = (s.posX ?? 285) + 'px';
    ltText.style.bottom = (s.posY ?? 308) + 'px';
    ltText.style.gap    = (s.gap  ?? 4)   + 'px';

    const font = s.fontFamily || 'Outfit';

    ltNama.style.fontSize   = (s.namaSize   ?? 38) + 'px';
    ltNama.style.fontWeight = s.namaWeight  || '700';
    ltNama.style.color      = s.namaColor   || '#ffffff';
    ltNama.style.fontFamily = `'${font}', sans-serif`;

    ltJabatan.style.fontSize   = (s.jabatanSize   ?? 26) + 'px';
    ltJabatan.style.fontWeight = s.jabatanWeight  || '300';
    ltJabatan.style.color      = s.jabatanColor   || '#e0f0ff';
    ltJabatan.style.fontFamily = `'${font}', sans-serif`;
  }

  // ── APPLY STATE ──
  function applyState(s) {
    applyStyle(s);

    const anim     = s.animationType || 'fade';
    const autoHide = s.autoHide || 0;
    const textChanged = ltNama.textContent !== (s.nama || '')
                     || ltJabatan.textContent !== (s.jabatan || '');

    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }

    // Image: langsung set dari s.visible, tidak bergantung pada isShowing
    // Ini memastikan image selalu sinkron dengan state, apapun kondisi animasi
    ltImage.style.opacity = s.visible ? '1' : '0';

    // ── SEMBUNYIKAN ──
    if (!s.visible) {
      if (isShowing) animateOut(anim);
      return;
    }

    // ── TAMPILKAN ──
    if (!isShowing) {
      ltNama.textContent    = s.nama    || '';
      ltJabatan.textContent = s.jabatan || '';
      animateIn(anim);
    } else if (textChanged) {
      animateOut(anim, () => {
        ltNama.textContent    = s.nama    || '';
        ltJabatan.textContent = s.jabatan || '';
        animateIn(anim);
        if (autoHide > 0) {
          autoTimer = setTimeout(() => animateOut(anim), autoHide * 1000);
        }
      });
      return;
    }

    if (autoHide > 0) {
      autoTimer = setTimeout(() => animateOut(anim), autoHide * 1000);
    }
  }

  // ── POLL ──
  async function poll() {
    try {
      const res = await fetch('/api/get');
      if (!res.ok) return;

      const { state } = await res.json();
      if (!state) return;

      const key = JSON.stringify(state);
      if (key === lastKey) return; // tidak ada perubahan

      lastKey = key;
      applyState(state);
    } catch (e) {
      // Abaikan error jaringan, coba lagi di poll berikutnya
    }
  }

  // Poll tiap 800ms
  setInterval(poll, 800);
  poll(); // panggil langsung saat load
</script>
</body>
</html>
