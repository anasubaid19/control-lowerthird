<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Lower Third Overlay</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', 'Outfit', sans-serif;
  }

  #lt-wrapper {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Uncomment dan ganti src jika pakai gambar lower third */
  /* #lt-image {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: auto;
  } */

  #lt-text {
    position: absolute;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  #lt-nama, #lt-jabatan {
    white-space: nowrap;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    line-height: 1.2;
  }

  /* Animasi muncul */
  @keyframes textIn {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Animasi hilang */
  @keyframes textOut {
    from { opacity:1; transform:translateY(0); }
    to   { opacity:0; transform:translateY(-6px); }
  }

  #lt-text.animating-in  { animation: textIn  0.4s ease forwards; }
  #lt-text.animating-out { animation: textOut 0.3s ease forwards; }
  #lt-text.hidden { opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="lt-wrapper">
  <!-- <img id="lt-image" src="lower_third.png"> -->
  <div id="lt-text" class="hidden">
    <div id="lt-nama"></div>
    <div id="lt-jabatan"></div>
  </div>
</div>

<script>
  const ltText    = document.getElementById('lt-text');
  const ltNama    = document.getElementById('lt-nama');
  const ltJabatan = document.getElementById('lt-jabatan');

  let lastKey = null;

  async function poll() {
    try {
      const res = await fetch('/api/get');
      if (!res.ok) return;
      const { state } = await res.json();
      if (!state) return;

      const key = JSON.stringify(state);
      if (key === lastKey) return;
      lastKey = key;

      applyState(state);
    } catch(e) {}
  }

  function applyState(s) {
    // Posisi & style
    ltText.style.left        = (s.posX ?? 285) + 'px';
    ltText.style.bottom      = (s.posY ?? 308) + 'px';
    ltNama.style.fontSize    = (s.namaSize    ?? 38) + 'px';
    ltJabatan.style.fontSize = (s.jabatanSize ?? 26) + 'px';
    ltNama.style.color       = s.namaColor    || '#ffffff';
    ltJabatan.style.color    = s.jabatanColor || '#e0f0ff';

    const namaChanged    = ltNama.textContent    !== (s.nama    || '');
    const jabatanChanged = ltJabatan.textContent !== (s.jabatan || '');
    const textChanged    = namaChanged || jabatanChanged;

    if (!s.visible) {
      // Sembunyikan dengan animasi
      if (!ltText.classList.contains('hidden')) {
        ltText.classList.remove('animating-in');
        ltText.classList.add('animating-out');
        setTimeout(() => {
          ltText.classList.add('hidden');
          ltText.classList.remove('animating-out');
        }, 320);
      }
      return;
    }

    if (ltText.classList.contains('hidden') || textChanged) {
      // Tampilkan / ganti teks dengan animasi
      if (textChanged && !ltText.classList.contains('hidden')) {
        // Fade out dulu lalu ganti
        ltText.classList.remove('animating-in');
        ltText.classList.add('animating-out');
        setTimeout(() => {
          ltNama.textContent    = s.nama    || '';
          ltJabatan.textContent = s.jabatan || '';
          ltText.classList.remove('animating-out', 'hidden');
          ltText.classList.add('animating-in');
        }, 320);
      } else {
        ltNama.textContent    = s.nama    || '';
        ltJabatan.textContent = s.jabatan || '';
        ltText.classList.remove('hidden', 'animating-out');
        ltText.classList.add('animating-in');
      }
    }
  }

  // Poll tiap 800ms — cukup responsif tanpa membebani Redis free tier
  setInterval(poll, 800);
  poll();
</script>
</body>
</html>
